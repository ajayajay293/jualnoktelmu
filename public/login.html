<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JarzX Telegram Store</title>
    <link rel="icon" type="image/png" href="tgstore-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00D4FF;
            --primary-dark: #00a8cc;
            --secondary: #7B61FF;
            --accent: #FF6B6B;
            --success: #00FF88;
            --warning: #FFA502;
            --danger: #FF4757;
            --dark: #0a0a0f;
            --darker: #050508;
            --card: #12121a;
            --card-hover: #1a1a25;
            --card-light: #1e1e2d;
            --text: #ffffff;
            --text-muted: #8b8b9a;
            --border: #2a2a3a;
            --gradient-1: linear-gradient(135deg, #00D4FF, #7B61FF);
            --gradient-2: linear-gradient(135deg, #7B61FF, #FF6B6B);
            --gradient-3: linear-gradient(135deg, #00D4FF, #00FF88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6), 0 0 60px rgba(123, 97, 255, 0.3); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(123, 97, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 102, 255, 0.05) 0%, transparent 70%),
                var(--darker);
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            animation: slideIn 0.6s ease-out;
        }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            background-size: 200% 100%;
            animation: gradientFlow 3s ease infinite;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.5));
        }

        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--darker);
            padding: 0.375rem;
            border-radius: 12px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.875rem;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-tab:hover {
            color: var(--text);
        }

        .auth-tab.active {
            background: var(--gradient-1);
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input.error {
            border-color: var(--danger);
            animation: shake 0.4s ease;
        }

        .input-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .admin-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .admin-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .admin-link a:hover {
            color: var(--secondary);
        }

        .admin-link svg {
            width: 16px;
            height: 16px;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 280px;
            max-width: 350px;
        }

        .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-icon.success {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
        }

        .toast-icon.error {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }

        .toast-icon svg {
            width: 20px;
            height: 20px;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .toast-message {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 8, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Password toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--text);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.75rem;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .logo-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="bg-grid"></div>
    <div class="bg-particles" id="particles"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <svg class="logo" viewBox="0 0 100 100" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00D4FF"/>
                            <stop offset="100%" style="stop-color:#7B61FF"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" opacity="0.2"/>
                    <circle cx="50" cy="50" r="35" fill="url(#logoGrad)" opacity="0.4"/>
                    <path d="M35 50L45 60L65 40" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="url(#logoGrad)"/>
                </svg>
                <div class="logo-title">JarzX</div>
                <div class="logo-subtitle">Telegram Store</div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
                <button class="auth-tab" onclick="switchTab('register')">Daftar</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username atau Email</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Masukkan password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Masuk
                </button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-input" id="regName" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="regUsername" placeholder="Buat username" required>
                    <p class="input-hint">Username minimal 4 karakter, tanpa spasi</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="regEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="regPassword" placeholder="Buat password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Password minimal 6 karakter</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="regConfirmPassword" placeholder="Ulangi password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword')">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                    Daftar Sekarang
                </button>
            </form>

            <div class="divider">atau</div>

            <div class="admin-link">
                <a href="owner.html">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Masuk sebagai Owner/Admin
                </a>
            </div>
        </div>

        <div class="auth-footer">
            <p>&copy; 2024 <a href="index.html">JarzX Telegram Store</a>. All rights reserved.</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memproses...</div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const API_URL = window.location.origin;

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            checkExistingSession();
        });

        // Create background particles
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // Check if user already logged in
        function checkExistingSession() {
            const savedUser = localStorage.getItem('tgstore_user');
            const sessionExpiry = localStorage.getItem('tgstore_session_expiry');
            
            if (savedUser && sessionExpiry) {
                const now = new Date().getTime();
                if (now < parseInt(sessionExpiry)) {
                    // Session still valid, redirect to main app
                    window.location.href = 'index.html';
                } else {
                    // Session expired, clear it
                    localStorage.removeItem('tgstore_user');
                    localStorage.removeItem('tgstore_session_expiry');
                }
            }
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tab');

            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
            }
        }

        // ==================== PASSWORD TOGGLE ====================
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // ==================== LOGIN ====================
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showToast('Lengkapi semua field!', 'error');
                return;
            }

            btn.disabled = true;
            showLoading(true);

            try {
                // Simulate API call - in production, replace with actual API
                await simulateApiCall();

                // Get users from localStorage
                const users = JSON.parse(localStorage.getItem('tgstore_users') || '[]');
                const user = users.find(u => (u.username === username || u.email === username) && u.password === password);

                if (user) {
                    // Create session
                    const sessionUser = {
                        id: user.id,
                        name: user.name,
                        username: user.username,
                        email: user.email,
                        balance: user.balance || 0,
                        totalSold: user.totalSold || 0,
                        joinedAt: user.joinedAt
                    };

                    // Save session (24 hours expiry)
                    localStorage.setItem('tgstore_user', JSON.stringify(sessionUser));
                    localStorage.setItem('tgstore_session_expiry', (new Date().getTime() + 24 * 60 * 60 * 1000).toString());

                    showToast('Login berhasil! Mengalihkan...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // Check if this is first login with default admin
                    if (username === 'admin' && password === 'admin123') {
                        const adminUser = {
                            id: 'admin_' + Date.now(),
                            name: 'Administrator',
                            username: 'admin',
                            email: 'admin@jarzx.com',
                            balance: 0,
                            totalSold: 0,
                            joinedAt: new Date().toISOString(),
                            isAdmin: true
                        };
                        localStorage.setItem('tgstore_user', JSON.stringify(adminUser));
                        localStorage.setItem('tgstore_session_expiry', (new Date().getTime() + 24 * 60 * 60 * 1000).toString());
                        showToast('Login admin berhasil!', 'success');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                        return;
                    }
                    showToast('Username atau password salah!', 'error');
                    document.getElementById('loginPassword').classList.add('error');
                    setTimeout(() => {
                        document.getElementById('loginPassword').classList.remove('error');
                    }, 1000);
                }
            } catch (error) {
                showToast('Terjadi kesalahan. Coba lagi.', 'error');
            } finally {
                btn.disabled = false;
                showLoading(false);
            }
        }

        // ==================== REGISTER ====================
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const btn = document.getElementById('registerBtn');

            // Validation
            if (!name || !username || !email || !password || !confirmPassword) {
                showToast('Lengkapi semua field!', 'error');
                return;
            }

            if (username.length < 4) {
                showToast('Username minimal 4 karakter!', 'error');
                document.getElementById('regUsername').classList.add('error');
                setTimeout(() => document.getElementById('regUsername').classList.remove('error'), 1000);
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter!', 'error');
                document.getElementById('regPassword').classList.add('error');
                setTimeout(() => document.getElementById('regPassword').classList.remove('error'), 1000);
                return;
            }

            if (password !== confirmPassword) {
                showToast('Password tidak cocok!', 'error');
                document.getElementById('regConfirmPassword').classList.add('error');
                setTimeout(() => document.getElementById('regConfirmPassword').classList.remove('error'), 1000);
                return;
            }

            btn.disabled = true;
            showLoading(true);

            try {
                await simulateApiCall();

                // Get existing users
                const users = JSON.parse(localStorage.getItem('tgstore_users') || '[]');

                // Check if username or email already exists
                if (users.find(u => u.username === username)) {
                    showToast('Username sudah digunakan!', 'error');
                    document.getElementById('regUsername').classList.add('error');
                    setTimeout(() => document.getElementById('regUsername').classList.remove('error'), 1000);
                    return;
                }

                if (users.find(u => u.email === email)) {
                    showToast('Email sudah terdaftar!', 'error');
                    document.getElementById('regEmail').classList.add('error');
                    setTimeout(() => document.getElementById('regEmail').classList.remove('error'), 1000);
                    return;
                }

                // Create new user
                const newUser = {
                    id: 'user_' + Date.now(),
                    name: name,
                    username: username,
                    email: email,
                    password: password,
                    balance: 0,
                    totalSold: 0,
                    joinedAt: new Date().toISOString()
                };

                // Save user
                users.push(newUser);
                localStorage.setItem('tgstore_users', JSON.stringify(users));

                // Update total users stat
                updateTotalUsers();

                showToast('Pendaftaran berhasil! Silakan login.', 'success');
                
                // Switch to login tab
                setTimeout(() => {
                    document.querySelector('.auth-tab').click();
                    document.getElementById('loginUsername').value = username;
                }, 1500);

            } catch (error) {
                showToast('Terjadi kesalahan. Coba lagi.', 'error');
            } finally {
                btn.disabled = false;
                showLoading(false);
            }
        }

        // Update total users stat
        function updateTotalUsers() {
            const users = JSON.parse(localStorage.getItem('tgstore_users') || '[]');
            const stats = JSON.parse(localStorage.getItem('tgstore_stats') || '{"total_users": 0, "total_accounts": 0, "total_withdrawn": 0}');
            stats.total_users = users.length;
            localStorage.setItem('tgstore_stats', JSON.stringify(stats));
        }

        // Simulate API delay
        function simulateApiCall() {
            return new Promise(resolve => setTimeout(resolve, 1000));
        }

        // ==================== TOAST ====================
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const icons = {
                success: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`,
                error: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`
            };

            toast.innerHTML = `
                <div class="toast-icon ${type}">${icons[type]}</div>
                <div class="toast-content">
                    <div class="toast-title">${type === 'success' ? 'Berhasil' : 'Error'}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ==================== LOADING ====================
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }
    </script>
</body>
</html>
